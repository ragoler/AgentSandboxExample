apiVersion: v1
kind: Namespace
metadata:
  name: main-app-ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: main-app-ksa
  namespace: main-app-ns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: main-app-role
rules:
- apiGroups: ["extensions.agents.x-k8s.io"]
  resources: ["sandboxclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: main-app-role-binding
subjects:
- kind: ServiceAccount
  name: main-app-ksa
  namespace: main-app-ns
roleRef:
  kind: ClusterRole
  name: main-app-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app-deployment
  namespace: main-app-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      serviceAccountName: main-app-ksa
      containers:
      - name: main-app
        image: ${REGION}-docker.pkg.dev/${PROJECT_NAME}/agent-sandbox-repo/main-app:latest
        ports:
        - containerPort: 8000
        env:
        - name: MODE
          value: "REAL"
        - name: GATEWAY_NAME
          value: "external-http-gateway"
        - name: PROJECT_NAME
          value: "${PROJECT_NAME}"
        - name: REGION
          value: "${REGION}"
---
apiVersion: v1
kind: Service
metadata:
  name: main-app-svc
  namespace: main-app-ns
spec:
  type: LoadBalancer
  selector:
    app: main-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
