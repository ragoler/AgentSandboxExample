apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: agent-sandbox-template
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        app: demo-agent
    spec:
      runtimeClassName: gvisor # Enforce gVisor sandbox
      serviceAccountName: ${SANDBOX_KSA}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
      - key: sandbox.gke.io/runtime
        operator: Equal
        value: gvisor
        effect: NoSchedule
      containers:
      - name: demo-app
        image: ${REGION}-docker.pkg.dev/${PROJECT_NAME}/agent-sandbox-repo/demo-app:latest
        ports:
        - containerPort: 8888
        securityContext:
          capabilities:
            drop: ["ALL"]
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "${PROJECT_NAME}"
        - name: REGION
          value: "${REGION}"
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "${GOOGLE_GENAI_USE_VERTEXAI}"
        # Only used when GOOGLE_GENAI_USE_VERTEXAI=FALSE (API key fallback).
        # When using Workload Identity (GOOGLE_GENAI_USE_VERTEXAI=TRUE), this
        # secret is not required and can be omitted from the template.
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: GEMINI_API_KEY
              optional: true
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      restartPolicy: OnFailure

