<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Sandbox Manager</title>
    <link rel="stylesheet" href="style.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="app.js?v=3" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agent Sandbox Manager</h1>
            <p>Deploy and orchestrate isolated AI environments on GKE</p>
        </header>

        <main>
            <section class="controls">
                <button id="create-btn" class="btn primary">Create New Sandbox</button>
                <button id="refresh-btn" class="btn secondary">Refresh List</button>
            </section>

            <section class="sandbox-grid" id="sandbox-grid">
                <!-- Sandbox cards will be injected here -->
                <div class="card skeleton">Loading sandboxes...</div>
            </section>
        </main>
        <footer>
            <div class="stats-pane" id="stats-pane">
                <h2>Cluster Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="total-stats">0</span>
                    </div>
                    <div class="stat-item running">
                        <span class="stat-label">Running</span>
                        <span class="stat-value" id="running-stats">0</span>
                    </div>
                    <div class="stat-item provisioning">
                        <span class="stat-label">Provisioning</span>
                        <span class="stat-value" id="provisioning-stats">0</span>
                    </div>
                    <div class="stat-item sleeping">
                        <span class="stat-label">Sleeping</span>
                        <span class="stat-value" id="sleeping-stats">0</span>
                    </div>
                    <div class="stat-item error">
                        <span class="stat-label">Error</span>
                        <span class="stat-value" id="error-stats">0</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>


</body>
</html>
