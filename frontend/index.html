<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Sandbox Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agent Sandbox Manager</h1>
            <p>Deploy and orchestrate isolated AI environments on GKE</p>
        </header>

        <main>
            <section class="controls">
                <button id="create-btn" class="btn primary">Create New Sandbox</button>
                <button id="refresh-btn" class="btn secondary">Refresh List</button>
            </section>

            <section class="sandbox-grid" id="sandbox-grid">
                <!-- Sandbox cards will be injected here -->
                <div class="card skeleton">Loading sandboxes...</div>
            </section>
        </main>
    </div>

    <!-- Modal for interaction -->
    <div id="modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">Interact with Sandbox</h2>
            <div class="modal-body">
                <div class="chat-area" id="chat-area">
                    <!-- Messages will appear here -->
                </div>
                <div class="input-group">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-btn" class="btn primary">Send</button>
                    <button id="quote-btn" class="btn secondary">Get Quote</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
