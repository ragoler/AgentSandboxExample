<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Sandbox Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agent Sandbox Manager</h1>
            <p>Deploy and orchestrate isolated AI environments on GKE</p>
        </header>

        <main>
            <section class="controls">
                <button id="create-btn" class="btn primary">Create New Sandbox</button>
                <button id="refresh-btn" class="btn secondary">Refresh List</button>
            </section>

            <section class="sandbox-grid" id="sandbox-grid">
                <!-- Sandbox cards will be injected here -->
                <div class="card skeleton">Loading sandboxes...</div>
            </section>
        </main>
    </div>


</body>
</html>
